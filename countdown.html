<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPOP Comeback Countdown</title>
    <meta name="description" content="查看 Kpop 组合回归倒计时｜BTS｜TXT｜TWS｜Track your favorite Kpop idol comeback dates with live countdowns.">
    <meta name="keywords" content="kpop comeback countdown, BTS comeback, TXT comeback, TWS comeback, kpop 回归倒计时">
    <meta property="og:title" content="KPOP Comeback Countdown">
    <meta property="og:description" content="查看 Kpop 组合回归倒计时｜BTS｜TXT｜TWS">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        :root {
            --c1: #f70684;
            --c2: #c80061;
            --soft-white: #fff7fc;
            --muted-white: rgba(255, 247, 252, 0.74);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100svh;
            overflow: hidden;
            color: var(--soft-white);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.24), transparent 18rem),
                linear-gradient(180deg, var(--c1) 0%, color-mix(in srgb, var(--c1) 60%, var(--c2)) 52%, var(--c2) 100%);
        }

        .back-btn {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            left: 16px;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 20px;
            color: var(--soft-white);
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: background 0.2s;
        }

        .back-btn:hover { background: rgba(0, 0, 0, 0.38); }

        main {
            position: relative;
            display: grid;
            min-height: 100svh;
            place-items: center;
            padding: clamp(72px, 9svh, 96px) 20px 76px;
        }

        .stage {
            display: grid;
            justify-items: center;
            width: min(100%, 460px);
            animation: rise 700ms ease both;
        }

        .album-art {
            display: grid;
            place-items: center;
            width: min(72vw, 320px);
            aspect-ratio: 1;
            margin-bottom: clamp(28px, 5svh, 42px);
            overflow: hidden;
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.16), transparent 36%),
                #f70684;
            box-shadow: 0 24px 54px rgba(76, 0, 40, 0.48);
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: markPulse 2600ms ease-in-out infinite;
        }

        .countdown-container {
            width: min(100%, 420px);
            padding: clamp(18px, 4vw, 24px) clamp(18px, 7vw, 38px);
            border-radius: 8px;
            background: rgba(8, 7, 10, 0.82);
            box-shadow: 0 18px 42px rgba(36, 0, 22, 0.5);
            backdrop-filter: blur(10px);
        }

        .title {
            margin-bottom: 24px;
            text-align: center;
            color: var(--soft-white);
            font-size: clamp(17px, 4.8vw, 22px);
            font-weight: 700;
            letter-spacing: 0;
            line-height: 1.32;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: clamp(8px, 3vw, 18px);
            text-align: center;
        }

        .time-block { min-width: 0; }

        .number {
            min-height: 1em;
            font-variant-numeric: tabular-nums;
            font-size: clamp(36px, 11vw, 52px);
            font-weight: 700;
            line-height: 0.95;
        }

        .label {
            margin-top: 8px;
            color: var(--muted-white);
            font-size: 13px;
            line-height: 1;
            letter-spacing: 0;
        }

        .event-note {
            max-width: 420px;
            margin-top: 18px;
            color: rgba(255, 247, 252, 0.76);
            text-align: center;
            font-size: 13px;
            line-height: 1.45;
        }

        .finished-msg {
            text-align: center;
            font-size: clamp(18px, 5vw, 24px);
            font-weight: 700;
            padding: 8px 0 4px;
        }

        footer {
            position: absolute;
            display: grid;
            justify-items: center;
            right: 18px;
            bottom: max(18px, env(safe-area-inset-bottom));
            left: 18px;
            text-align: center;
            pointer-events: none;
        }

        .signature {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.5;
            color: var(--soft-white);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .not-found {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100svh;
            gap: 16px;
            padding: 24px;
            text-align: center;
        }

        .not-found h2 { font-size: 22px; font-weight: 700; }

        .not-found a {
            color: var(--soft-white);
            font-size: 13px;
            opacity: 0.7;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes markPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.035); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }

        @media (max-width: 390px) {
            main { padding-inline: 14px; }
            .countdown-container { padding-inline: 16px; }
            .number { font-size: clamp(32px, 10vw, 38px); }
        }
    </style>
</head>
<body>

<a class="back-btn" href="index.html">← Back</a>

<main>
    <div class="not-found" id="not-found" style="display:none">
        <h2>Comeback not found</h2>
        <a href="index.html">← Back to list</a>
    </div>

    <section class="stage" id="stage" style="display:none" aria-label="comeback countdown">
        <div class="album-art" aria-hidden="true">
            <img class="logo" id="album-img" src="" alt="">
        </div>

        <div class="countdown-container">
            <h1 class="title" id="title-el"></h1>
            <div class="countdown" id="countdown">
                <div class="time-block">
                    <div class="number" id="days">00</div>
                    <div class="label">天</div>
                </div>
                <div class="time-block">
                    <div class="number" id="hours">00</div>
                    <div class="label">小时</div>
                </div>
                <div class="time-block">
                    <div class="number" id="minutes">00</div>
                    <div class="label">分钟</div>
                </div>
                <div class="time-block">
                    <div class="number" id="seconds">00</div>
                    <div class="label">秒</div>
                </div>
            </div>
            <div class="finished-msg" id="finished-msg" style="display:none">🎉 已回归</div>
        </div>

        <p class="event-note" id="event-note"></p>
    </section>
</main>

<footer>
    <span class="signature">© AMISOI</span>
</footer>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id");

async function init() {
    let data = [];
    try {
        const res = await fetch('data.json?v=' + Date.now());
        data = await res.json();
    } catch(e) {}

    const entry = data.find(e => e.id === id);

    if (!entry) {
        document.getElementById("not-found").style.display = "flex";
        return;
    }

    // Apply gradient from config
    document.body.style.setProperty("--c1", entry.c1 || "#f70684");
    document.body.style.setProperty("--c2", entry.c2 || "#c80061");

    // Fill content
    document.getElementById("album-img").src = entry.img;
    document.getElementById("album-img").alt = entry.group;
    document.getElementById("title-el").innerHTML = `${entry.group}<br>${entry.comeback}`;

    // Event note
    const d = new Date(entry.targetISO);
    const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} KST`;
    document.getElementById("event-note").textContent =
        dateStr + (entry.album ? " · " + entry.album : "");

    document.title = `${entry.group} Comeback Countdown · KPOP`;
    document.getElementById("stage").style.display = "grid";

    // Countdown timer
    const target = new Date(entry.targetISO).getTime();
    const els = {
        days: document.getElementById("days"),
        hours: document.getElementById("hours"),
        minutes: document.getElementById("minutes"),
        seconds: document.getElementById("seconds"),
    };

    function fmt(v) { return String(v).padStart(2, "0"); }

    function tick() {
        const diff = target - Date.now();
        if (diff <= 0) {
            els.days.textContent = els.hours.textContent =
            els.minutes.textContent = els.seconds.textContent = "00";
            document.getElementById("countdown").style.opacity = "0.3";
            document.getElementById("finished-msg").style.display = "block";
            return;
        }
        const DAY = 86400000, HOUR = 3600000, MIN = 60000;
        els.days.textContent = fmt(Math.floor(diff / DAY));
        els.hours.textContent = fmt(Math.floor((diff % DAY) / HOUR));
        els.minutes.textContent = fmt(Math.floor((diff % HOUR) / MIN));
        els.seconds.textContent = fmt(Math.floor((diff % MIN) / 1000));
    }

    tick();
    setInterval(tick, 1000);
}

init();
</script>
</body>
</html>

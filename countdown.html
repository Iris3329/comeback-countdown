<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPOP Comeback Countdown</title>
    <style>
        :root {
            --c1: #f70684;
            --c2: #c80061;
            --soft-white: #fff7fc;
            --muted-white: rgba(255, 247, 252, 0.74);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100svh;
            overflow: hidden;
            color: var(--soft-white);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 50% 18%, rgba(255,255,255,0.24), transparent 18rem),
                        linear-gradient(180deg, var(--c1) 0%, color-mix(in srgb, var(--c1) 60%, var(--c2)) 52%, var(--c2) 100%);
        }

        .back-btn, .share-btn {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            z-index: 10;
            padding: 8px 14px;
            background: rgba(0,0,0,0.22);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 20px;
            color: var(--soft-white);
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }
        .back-btn { left: 16px; }
        .share-btn {
            right: 16px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }
        .share-btn:hover { background: rgba(0,0,0,0.45); }

        main {
            position: relative;
            display: grid;
            min-height: 100svh;
            place-items: center;
            padding: clamp(72px, 9svh, 96px) 20px 100px;
        }

        .stage { display: grid; justify-items: center; width: min(100%, 460px); }
        .album-art {
            width: min(72vw, 320px);
            aspect-ratio: 1;
            margin-bottom: clamp(28px, 5svh, 42px);
            overflow: hidden;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(255,255,255,0.16), transparent 36%), #f70684;
            box-shadow: 0 24px 54px rgba(76,0,40,0.48);
        }
        .logo { width: 100%; height: 100%; object-fit: cover; }

        .countdown-container {
            width: min(100%, 420px);
            padding: clamp(18px, 4vw, 24px) clamp(18px, 7vw, 38px);
            border-radius: 8px;
            background: rgba(8,7,10,0.82);
            box-shadow: 0 18px 42px rgba(36,0,22,0.5);
            backdrop-filter: blur(10px);
        }

        .title { margin-bottom: 24px; text-align: center; font-size: clamp(17px, 4.8vw, 22px); font-weight: 700; line-height: 1.32; }
        .countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(8px, 3vw, 18px); text-align: center; }
        .number { font-size: clamp(36px, 11vw, 52px); font-weight: 700; }
        .label { margin-top: 8px; font-size: 13px; color: var(--muted-white); }
        .event-note { margin-top: 18px; text-align: center; font-size: 13px; opacity: 0.76; }

        footer {
            position: absolute;
            bottom: max(18px, env(safe-area-inset-bottom));
            left: 0; right: 0;
            text-align: center;
            pointer-events: none;
        }
        .signature { opacity: 0.5; font-size: 12px; font-weight: 700; }

        /* 分享弹窗 */
        .share-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .share-content {
            background: #1c1c1c;
            padding: 28px 24px;
            border-radius: 16px;
            width: min(92%, 380px);
            text-align: center;
        }
        .share-link-box {
            display: flex;
            align-items: center;
            background: #333;
            padding: 12px 14px;
            border-radius: 8px;
            margin: 16px 0;
            font-size: 13px;
            word-break: break-all;
        }
        .copy-btn {
            margin-left: 10px;
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">← Back</a>
    <div class="share-btn" id="share-btn">↗</div>

    <main>
        <section class="stage" id="stage" style="display:none">
            <div class="album-art">
                <img class="logo" id="album-img" src="" alt="">
            </div>
            <div class="countdown-container">
                <h1 class="title" id="title-el"></h1>
                <div class="countdown" id="countdown">
                    <div class="time-block"><div class="number" id="days">00</div><div class="label">天</div></div>
                    <div class="time-block"><div class="number" id="hours">00</div><div class="label">小时</div></div>
                    <div class="time-block"><div class="number" id="minutes">00</div><div class="label">分钟</div></div>
                    <div class="time-block"><div class="number" id="seconds">00</div><div class="label">秒</div></div>
                </div>
                <div class="finished-msg" id="finished-msg" style="display:none; margin-top:12px; font-size:20px;">🎉 已回归</div>
            </div>
            <p class="event-note" id="event-note"></p>
        </section>
    </main>

    <footer>
        <span class="signature">© AMISOI</span>
    </footer>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="share-modal">
        <div class="share-content">
            <h3>分享这个回归倒计时</h3>
            <p style="margin:8px 0 16px; opacity:0.75;">你想吧哈哈～</p>
            
            <div class="share-link-box" id="share-link-box">
                <span id="share-link-text" style="flex:1; text-align:left;"></span>
                <button class="copy-btn" id="copy-btn" title="复制链接">📋</button>
            </div>

            <!-- 固定二维码（使用你上传的图片） -->
            <div style="margin: 24px 0 16px;">
                <img src="https://github.com/Iris3329/comeback-countdown/blob/main/assets/https___iris3329.github.io_comeback-countdown_.png?raw=true" 
                     alt="列表页二维码" 
                     style="width:200px; height:200px; border-radius:8px;">
            </div>

            <button onclick="closeShareModal()" 
                    style="padding:12px 32px; background:#FEFEFE; color:#1a1a1a; border:none; border-radius:30px; font-weight:600; width:100%;">
                关闭
            </button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const id = params.get("id");
        let currentGroup = "";

        async function init() {
            let data = [];
            try {
                const res = await fetch('data.json?v=' + Date.now());
                data = await res.json();
            } catch(e) {}

            const entry = data.find(e => e.id === id);
            if (!entry) {
                document.getElementById("stage").innerHTML = `<div style="text-align:center;padding:40px"><h2>Comeback not found</h2><a href="index.html">← Back to list</a></div>`;
                return;
            }

            currentGroup = entry.group;

            document.body.style.setProperty("--c1", entry.c1 || "#f70684");
            document.body.style.setProperty("--c2", entry.c2 || "#c80061");

            document.getElementById("album-img").src = entry.img || "";
            document.getElementById("title-el").innerHTML = `${entry.group}<br>${entry.comeback}`;

            const d = new Date(entry.targetISO);
            const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} KST`;
            document.getElementById("event-note").textContent = dateStr + (entry.album ? " · " + entry.album : "");

            document.getElementById("stage").style.display = "grid";

            // 倒计时
            const target = new Date(entry.targetISO).getTime();
            const els = { days: document.getElementById("days"), hours: document.getElementById("hours"), minutes: document.getElementById("minutes"), seconds: document.getElementById("seconds") };
            function fmt(v) { return String(v).padStart(2, "0"); }
            function tick() {
                const diff = target - Date.now();
                if (diff <= 0) {
                    Object.values(els).forEach(el => el.textContent = "00");
                    document.getElementById("finished-msg").style.display = "block";
                    return;
                }
                const DAY = 86400000, HOUR = 3600000, MIN = 60000;
                els.days.textContent = fmt(Math.floor(diff / DAY));
                els.hours.textContent = fmt(Math.floor((diff % DAY) / HOUR));
                els.minutes.textContent = fmt(Math.floor((diff % HOUR) / MIN));
                els.seconds.textContent = fmt(Math.floor((diff % MIN) / 1000));
            }
            tick();
            setInterval(tick, 1000);
        }

        // 分享功能 - 链接专属，二维码固定
        function showShareModal() {
            const modal = document.getElementById("share-modal");
            const linkText = document.getElementById("share-link-text");
            const currentUrl = window.location.href;

            linkText.textContent = currentUrl;   // 每个组合保持专属链接

            modal.style.display = "flex";
        }

        function closeShareModal() {
            document.getElementById("share-modal").style.display = "none";
        }

        // 复制链接
        function copyLink() {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => {
                const btn = document.getElementById("copy-btn");
                const original = btn.textContent;
                btn.textContent = "✅";
                setTimeout(() => btn.textContent = original, 1500);
            });
        }

        document.getElementById("share-btn").addEventListener("click", showShareModal);
        document.getElementById("share-modal").addEventListener("click", e => {
            if (e.target === e.currentTarget) closeShareModal();
        });
        document.getElementById("copy-btn").addEventListener("click", copyLink);

        init();
    </script>
</body>
</html>

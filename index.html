<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8F2SBWPNJH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-8F2SBWPNJH');
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPOP Comeback Countdown</title>
    <meta name="description" content="查看 Kpop 组合回归倒计时｜BTS｜TXT｜TWS｜Track your favorite Kpop idol comeback dates with live countdowns.">
    <meta name="keywords" content="kpop comeback countdown, BTS comeback, TXT comeback, TWS comeback, kpop 回归倒计时, kpop idol comeback">
    <meta property="og:title" content="KPOP Comeback Countdown">
    <meta property="og:description" content="查看 Kpop 组合回归倒计时｜BTS｜TXT｜TWS">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="KPOP Comeback Countdown">
    <meta name="twitter:description" content="Track your favorite Kpop idol comeback with live countdowns. BTS, TXT, TWS and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f2f7;
            --surface: #ffffff;
            --border: rgba(0,0,0,0.07);
            --text: #0d0b14;
            --muted: rgba(13,11,20,0.42);
            --accent: #f70684;
            --tag-bg: rgba(247,6,132,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100svh;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
        }

        /* ── Header ── */
        header {
            padding: 28px 20px 0;
            max-width: 680px;
            margin: 0 auto;
        }

        .site-mark {
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(26px, 6vw, 36px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        /* ── Tabs ── */
        .tabs {
            display: inline-flex;
            background: rgba(0,0,0,0.06);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            padding: 8px 24px;
            border-radius: 9px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted);
            transition: all 0.22s;
        }

        .tab.active {
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* ── List ── */
        main {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        .date-group { margin-bottom: 28px; }

        .date-label {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
        }

        .date-label .day {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
        }

        .date-label .weekday {
            font-size: 13px;
            color: var(--muted);
        }

        .date-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
            margin-right: 4px;
            opacity: 0.4;
        }

        .date-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 18px 18px 18px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border);
            transition: transform 0.18s, box-shadow 0.18s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.09); }
        .card:hover::before { opacity: 1; }

        .card-thumb {
            width: 72px; height: 72px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg);
        }

        .card-body { flex: 1; min-width: 0; }

        .card-time {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .card-time .live-tz {
            color: var(--accent);
            font-weight: 500;
        }

        .card-group {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-comeback {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-countdown {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            background: var(--tag-bg);
            padding: 6px 12px;
            border-radius: 8px;
            flex-shrink: 0;
            text-align: right;
            line-height: 1.4;
            white-space: nowrap;
        }

        .card-countdown.past {
            color: var(--muted);
            background: rgba(0,0,0,0.05);
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 13px;
        }

        /* ── Footer ── */
        footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: center;
            padding: 14px;
            background: linear-gradient(transparent, var(--bg) 60%);
            pointer-events: none;
        }

        .footer-sig {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.06em;
        }

        @media (max-width: 480px) {
            .card-countdown { display: none; }
            .card-thumb { width: 56px; height: 56px; }
        }
    </style>
</head>
<body>
<header>
    <div class="site-mark">AMISOI · Kpop Comeback Tracker</div>
    <h1>Comebacks</h1>
    <div class="tabs">
        <button class="tab active" id="tab-upcoming" onclick="switchTab('upcoming')">Upcoming</button>
        <button class="tab" id="tab-past" onclick="switchTab('past')">Past</button>
    </div>
</header>

<main id="main-list"></main>

<footer>
    <span class="footer-sig">© AMISOI</span>
</footer>

<script>
let ALL_DATA = [];
let currentTab = "upcoming";

async function init() {
    try {
        const res = await fetch('data.json?v=' + Date.now());
        ALL_DATA = await res.json();
    } catch(e) {
        ALL_DATA = [];
    }
    render();
    setInterval(tick, 1000);
    setInterval(render, 60000);
}

function switchTab(tab) {
    currentTab = tab;
    document.getElementById("tab-upcoming").classList.toggle("active", tab === "upcoming");
    document.getElementById("tab-past").classList.toggle("active", tab === "past");
    render();
}

const DAYS_ZH = ["周日","周一","周二","周三","周四","周五","周六"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function formatDateLabel(date) {
    const d = new Date(date);
    return {
        day: `${d.getDate()} ${MONTHS[d.getMonth()]}`,
        weekday: DAYS_ZH[d.getDay()]
    };
}

function formatTime(date) {
    const d = new Date(date);
    return d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
}

// Group entries by date
function groupByDate(entries) {
    const groups = {};
    entries.forEach(e => {
        const d = new Date(e.targetISO);
        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        if (!groups[key]) groups[key] = { date: d, entries: [] };
        groups[key].entries.push(e);
    });
    return Object.values(groups).sort((a, b) =>
        currentTab === "upcoming" ? a.date - b.date : b.date - a.date
    );
}

function countdownStr(targetISO) {
    const diff = new Date(targetISO) - Date.now();
    if (diff <= 0) return null;
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    if (d > 0) return `${d}d ${String(h).padStart(2,'0')}h\n${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function cardId(entry) { return `cd-${entry.id}`; }

function buildCard(entry) {
    const isPast = new Date(entry.targetISO) < Date.now();
    const timeStr = formatTime(entry.targetISO);
    const cdTxt = isPast ? "已回归" : (countdownStr(entry.targetISO) || "已回归");
    const params = new URLSearchParams({ id: entry.id });
    return `
    <a class="card" href="countdown.html?${params}" id="${cardId(entry)}">
        <img class="card-thumb" src="${entry.img}" alt="${entry.group}" onerror="this.style.opacity=0.2">
        <div class="card-body">
            <div class="card-time">${timeStr}</div>
            <div class="card-group">${entry.group}</div>
            <div class="card-comeback">${entry.comeback}${entry.album ? ' · ' + entry.album : ''}</div>
        </div>
        <div class="card-countdown ${isPast ? 'past' : ''}" id="${cardId(entry)}-cd">${cdTxt.replace('\n','<br>')}</div>
    </a>`;
}

function render() {
    const all = ALL_DATA;
    const now = Date.now();
    const filtered = all.filter(e =>
        currentTab === "upcoming"
            ? new Date(e.targetISO) >= now
            : new Date(e.targetISO) < now
    );

    const main = document.getElementById("main-list");

    if (filtered.length === 0) {
        main.innerHTML = `<div class="empty">${currentTab === "upcoming" ? "No upcoming comebacks yet" : "No past comebacks"}</div>`;
        return;
    }

    const groups = groupByDate(filtered);
    main.innerHTML = groups.map(g => {
        const { day, weekday } = formatDateLabel(g.date);
        return `
        <div class="date-group">
            <div class="date-row">
                <div class="date-dot"></div>
                <div class="date-label">
                    <span class="day">${day}</span>
                    <span class="weekday">${weekday}</span>
                </div>
            </div>
            ${g.entries.map(buildCard).join('')}
        </div>`;
    }).join('');
}

// live countdown ticker
function tick() {
    const all = ALL_DATA;
    all.forEach(entry => {
        const el = document.getElementById(`${cardId(entry)}-cd`);
        if (!el) return;
        const isPast = new Date(entry.targetISO) < Date.now();
        if (!isPast) {
            const txt = countdownStr(entry.targetISO) || "已回归";
            el.innerHTML = txt.replace('\n','<br>');
        }
    });
}

init();
</script>
</body>
</html>
